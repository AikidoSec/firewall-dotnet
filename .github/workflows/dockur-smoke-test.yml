name: Dockur Smoke Test

permissions:
  contents: read

on:
  push:
    branches:
      - chore/dockur-xp-smoke-test
  workflow_dispatch: {}

jobs:
  dockur-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check runner capabilities
        run: |
          uname -a
          ls -l /dev/kvm /dev/net/tun
          grep -m 5 -E 'vmx|svm' /proc/cpuinfo || true

      - name: Prepare Dockur OEM installer
        run: |
          mkdir -p "$RUNNER_TEMP/dockur-oem"
          mkdir -p "$RUNNER_TEMP/dockur-shared"
          cat > "$RUNNER_TEMP/dockur-oem/install.ps1" <<'EOF'
          $ErrorActionPreference = 'Stop'
          $sharePath = '\\host.lan\Data'
          $sitePath = 'C:\IISExpressSite'
          $installerPath = 'C:\OEM\iisexpress_amd64_en-US.msi'
          $iisExpressExe = 'C:\Program Files\IIS Express\iisexpress.exe'
          $downloadUrl = 'https://download.microsoft.com/download/c/e/8/ce8d18f5-d4c0-45b5-b531-adecd637a1aa/iisexpress_amd64_en-US.msi'

          function Write-SharedFile {
            param(
              [string]$Name,
              [string]$Value
            )

            try {
              Set-Content -Path (Join-Path $sharePath $Name) -Value $Value -Encoding Ascii
            } catch {
              Write-Host "Unable to write $Name to shared folder: $($_.Exception.Message)"
            }
          }

          Write-SharedFile -Name 'oem-status.txt' -Value 'started'

          Invoke-WebRequest -UseBasicParsing -Uri $downloadUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList '/i', $installerPath, '/quiet', '/norestart' -Wait

          New-Item -ItemType Directory -Path $sitePath -Force | Out-Null
          Set-Content -Path (Join-Path $sitePath 'index.html') -Value 'dockur-iisexpress-ok' -Encoding Ascii

          if (-not (Get-NetFirewallRule -DisplayName 'Dockur IIS Express HTTP 8080' -ErrorAction SilentlyContinue)) {
            New-NetFirewallRule -DisplayName 'Dockur IIS Express HTTP 8080' -Direction Inbound -Action Allow -Protocol TCP -LocalPort 8080 | Out-Null
          }

          Start-Process -FilePath $iisExpressExe -ArgumentList "/path:$sitePath", '/port:8080', '/systray:false'

          $iisOk = $false
          for ($i = 0; $i -lt 40 -and -not $iisOk; $i++) {
            try {
              $response = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8080/
              if ($response.Content -match 'dockur-iisexpress-ok') {
                $iisOk = $true
                break
              }
            } catch {
            }

            Start-Sleep -Seconds 5
          }

          if ($iisOk) {
            Write-SharedFile -Name 'iisexpress-selftest.txt' -Value 'dockur-iisexpress-ok'
            Write-SharedFile -Name 'oem-status.txt' -Value 'completed'
            exit 0
          }

          Write-SharedFile -Name 'iisexpress-selftest.txt' -Value 'iisexpress-selftest-failed'
          Write-SharedFile -Name 'oem-status.txt' -Value 'failed'
          exit 1
          EOF
          cat > "$RUNNER_TEMP/dockur-oem/install.bat" <<'EOF'
          @echo off
          powershell -NoLogo -NoProfile -ExecutionPolicy Bypass -File C:\OEM\install.ps1
          if errorlevel 1 exit /b 1
          EOF

      - name: Start Dockur with Windows Server 2019
        run: |
          mkdir -p "$RUNNER_TEMP/dockur-2019"
          docker run -d --name dockur-win \
            -e VERSION=2019 \
            -p 8006:8006 \
            -p 3389:3389/tcp \
            -p 3389:3389/udp \
            --device /dev/kvm \
            --device /dev/net/tun \
            --cap-add NET_ADMIN \
            -v "$RUNNER_TEMP/dockur-2019:/storage" \
            -v "$RUNNER_TEMP/dockur-oem:/oem" \
            -v "$RUNNER_TEMP/dockur-shared:/shared" \
            --stop-timeout 120 \
            docker.io/dockurr/windows

      - name: Wait for Dockur web UI
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8006 > /dev/null; then
              echo "Dockur UI is reachable."
              break
            fi
            sleep 5
          done

          curl -fsS http://127.0.0.1:8006 > /dev/null

      - name: Wait for Windows RDP
        run: |
          for i in $(seq 1 120); do
            if timeout 5 bash -lc "</dev/tcp/127.0.0.1/3389" 2>/dev/null; then
              echo "Windows RDP port is reachable."
              exit 0
            fi
            sleep 15
          done

          echo "Windows RDP port never became reachable."
          exit 1

      - name: Wait for IIS Express self-test marker
        run: |
          for i in $(seq 1 40); do
            echo "Poll $i/40"
            ls -la "$RUNNER_TEMP/dockur-shared" || true
            cat "$RUNNER_TEMP/dockur-shared/oem-status.txt" || true
            cat "$RUNNER_TEMP/dockur-shared/iisexpress-selftest.txt" || true

            if [ -f "$RUNNER_TEMP/dockur-shared/iisexpress-selftest.txt" ] && grep -q "dockur-iisexpress-ok" "$RUNNER_TEMP/dockur-shared/iisexpress-selftest.txt"; then
              echo "IIS Express self-test marker is present."
              exit 0
            fi
            sleep 15
          done

          echo "IIS Express self-test marker never appeared."
          exit 1

      - name: Show shared status files
        if: always()
        run: |
          ls -la "$RUNNER_TEMP/dockur-shared" || true
          cat "$RUNNER_TEMP/dockur-shared/oem-status.txt" || true
          cat "$RUNNER_TEMP/dockur-shared/iisexpress-selftest.txt" || true

      - name: Show container status
        if: always()
        run: |
          docker ps -a
          docker inspect dockur-win --format '{{.State.Status}}' || true

      - name: Show Dockur logs
        if: always()
        run: docker logs --tail 200 dockur-win || true
