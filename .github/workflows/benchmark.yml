name: Benchmarks

on:
    pull_request: {}
permissions:
    contents: read

jobs:
    benchmark:
        runs-on: ubuntu-latest
        timeout-minutes: 45

        env:
            DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
            DOTNET_CLI_TELEMETRY_OPTOUT: true
            BENCHMARK_FILTER: "*"
            REGRESSION_THRESHOLD_PERCENT: 15

        steps:
            - name: Checkout current commit
              uses: actions/checkout@v4
              with:
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Checkout main branch for baseline
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.base.sha }}
                  path: baseline

            - name: Set up .NET
              uses: actions/setup-dotnet@v5.1.0
              with:
                  dotnet-version: "10.0.x"

            - name: Run benchmark regression
              run: |
                  rm -rf baseline/Aikido.Zen.Benchmarks
                  cp -R Aikido.Zen.Benchmarks baseline/Aikido.Zen.Benchmarks

                  (
                    cd baseline
                    dotnet run \
                      --project Aikido.Zen.Benchmarks/Aikido.Zen.Benchmarks.csproj \
                      --configuration Release \
                      --framework net10.0 \
                      -- \
                      --filter "$BENCHMARK_FILTER"
                  )

                  dotnet run \
                    --project Aikido.Zen.Benchmarks/Aikido.Zen.Benchmarks.csproj \
                    --configuration Release \
                    --framework net10.0 \
                    -- \
                    --filter "$BENCHMARK_FILTER"

                  dotnet run \
                    --project Aikido.Zen.Benchmarks/Aikido.Zen.Benchmarks.csproj \
                    --configuration Release \
                    --framework net10.0 \
                    -- \
                    --compare-results \
                    --baseline baseline/BenchmarkDotNet.Artifacts/results \
                    --current BenchmarkDotNet.Artifacts/results \
                    --threshold-percent "$REGRESSION_THRESHOLD_PERCENT" \
                    --output-md benchmark-regression.md

            - name: Publish benchmark summary
              if: always()
              run: |
                  if [ -f benchmark-regression.md ]; then
                    cat benchmark-regression.md >> "$GITHUB_STEP_SUMMARY"
                  fi

            - name: Upload benchmark artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: benchmark-regression
                  if-no-files-found: ignore
                  path: |
                      benchmark-regression.md
                      baseline/BenchmarkDotNet.Artifacts/results/*
                      BenchmarkDotNet.Artifacts/results/*
