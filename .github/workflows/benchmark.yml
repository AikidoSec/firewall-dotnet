name: Benchmarks

on:
    pull_request: {}
permissions:
    contents: read

jobs:
    benchmark:
        runs-on: ubuntu-latest
        timeout-minutes: 45

        env:
            DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
            DOTNET_CLI_TELEMETRY_OPTOUT: true
            BENCHMARK_FILTER: "*"
            REGRESSION_THRESHOLD_PERCENT: 15

        steps:
            - name: Checkout current commit
              uses: actions/checkout@v4
              with:
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Set up .NET
              uses: actions/setup-dotnet@v5.1.0
              with:
                  dotnet-version: "10.0.x"

            - name: Restore cached baseline results
              id: baseline-cache
              uses: actions/cache/restore@v4
              with:
                  path: baseline-results
                  key: benchmark-baseline-${{ runner.os }}-net10-${{ github.event.pull_request.base.sha }}-${{ hashFiles('Aikido.Zen.Benchmarks/**/*.cs', 'Aikido.Zen.Benchmarks/Aikido.Zen.Benchmarks.csproj') }}

            - name: Checkout main branch for baseline
              if: steps.baseline-cache.outputs.cache-hit != 'true'
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.base.sha }}
                  path: baseline

            - name: Run baseline benchmarks
              if: steps.baseline-cache.outputs.cache-hit != 'true'
              run: |
                  rm -rf baseline/Aikido.Zen.Benchmarks
                  cp -R Aikido.Zen.Benchmarks baseline/Aikido.Zen.Benchmarks

                  (
                    cd baseline
                    dotnet run \
                      --project Aikido.Zen.Benchmarks/Aikido.Zen.Benchmarks.csproj \
                      --configuration Release \
                      --framework net10.0 \
                      -- \
                      --filter "$BENCHMARK_FILTER"
                  )

                  rm -rf baseline-results
                  mkdir -p baseline-results
                  cp -R baseline/BenchmarkDotNet.Artifacts/results baseline-results/results

            - name: Save baseline benchmark results
              if: steps.baseline-cache.outputs.cache-hit != 'true'
              uses: actions/cache/save@v4
              continue-on-error: true
              with:
                  path: baseline-results
                  key: benchmark-baseline-${{ runner.os }}-net10-${{ github.event.pull_request.base.sha }}-${{ hashFiles('Aikido.Zen.Benchmarks/**/*.cs', 'Aikido.Zen.Benchmarks/Aikido.Zen.Benchmarks.csproj') }}

            - name: Run benchmark regression
              run: |
                  rm -rf baseline
                  test -d baseline-results/results

                  dotnet run \
                    --project Aikido.Zen.Benchmarks/Aikido.Zen.Benchmarks.csproj \
                    --configuration Release \
                    --framework net10.0 \
                    -- \
                    --filter "$BENCHMARK_FILTER"

                  dotnet run \
                    --project Aikido.Zen.Benchmarks/Aikido.Zen.Benchmarks.csproj \
                    --configuration Release \
                    --framework net10.0 \
                    -- \
                    --compare-results \
                    --threshold-percent "$REGRESSION_THRESHOLD_PERCENT"

            - name: Publish benchmark summary
              if: always()
              run: |
                  if [ -f benchmark-regression.md ]; then
                    cat benchmark-regression.md >> "$GITHUB_STEP_SUMMARY"
                  fi

            - name: Upload benchmark artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: benchmark-regression
                  if-no-files-found: ignore
                  path: |
                      benchmark-regression.md
                      baseline-results/results/*
                      BenchmarkDotNet.Artifacts/results/*
